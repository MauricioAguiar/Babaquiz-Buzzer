<!DOCTYPE html>
<html>
<head>
    <title>Host - Controle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Painel do Host</h2>
    
    <div id="winner-display">...</div>

    <button class="big-btn btn-unlock" onclick="unlockBuzzer()">LIBERAR BOTÃO (GO!)</button>
    <button class="big-btn btn-reset" onclick="resetBuzzer()">Resetar Rodada</button>
    <button class="big-btn" id="btn-qr" onclick="toggleQRCode()" style="background-color: #444; margin-top: 20px;">Esconder QR Code</button>

    <h3>Placar Geral</h3>
    <div id="scoreboard" class="scoreboard"></div>

    <audio id="audio-correct" src="{{ url_for('static', filename='buzzer.mp3') }}"></audio>

    <script>
        const socket = io();
        socket.emit('join_game', { username: 'Host', role: 'host' });
        let qrVisible = true;

        function toggleQRCode() {
            qrVisible = !qrVisible;
            const btn = document.getElementById('btn-qr');
            
            // Muda o texto do botão no seu celular/painel
            btn.innerText = qrVisible ? "Esconder QR Code" : "Mostrar QR Code";
            btn.style.backgroundColor = qrVisible ? "#444" : "var(--neon-roxo)";

            // Envia o comando para o servidor
            socket.emit('toggle_qr_server', { visible: qrVisible });
        }

        function unlockBuzzer() {
            socket.emit('host_action', { action: 'unlock' });
            document.getElementById('winner-display').innerText = "ESPERANDO...";
        }

        function resetBuzzer() {
            socket.emit('host_action', { action: 'reset' });
            document.getElementById('winner-display').innerText = "...";
        }

        // Função para SOMAR ou SUBTRAIR
        function addScore(user) {
            const input = document.getElementById(`input-${user}`);
            const valor = parseInt(input.value);
            if (!isNaN(valor) && valor !== 0) {
                socket.emit('update_score', { username: user, points: valor });
                input.value = ''; // Limpa o campo
            }
        }

        // Função para DEFINIR (Corrigir) o valor exato
        function setScore(user) {
            const input = document.getElementById(`input-${user}`);
            const valor = parseInt(input.value);
            if (!isNaN(valor)) {
                socket.emit('set_score', { username: user, score: valor });
                input.value = ''; // Limpa o campo
            }
        }

        // Tocar som
        function playWinnerSound() {
            const audio = document.getElementById('audio-correct');
            if(audio) {
                audio.currentTime = 0; // Reinicia o som
                audio.play().catch(e => console.log("Erro ao tocar som (navegador bloqueou?):", e));
            }
        }

        socket.on('player_won', (data) => {
            document.getElementById('winner-display').innerText = "VENCEDOR: " + data.winner;
            playWinnerSound(); // Toca o som automaticamente
        });

        socket.on('update_scores', (scores) => {
            const board = document.getElementById('scoreboard');
            // Salvamos os valores que estão digitados nos inputs para não sumirem quando atualizar
            const inputsValues = {};
            document.querySelectorAll('input[id^="input-"]').forEach(input => {
                inputsValues[input.id] = input.value;
            });

            board.innerHTML = '';
            
            for (const [user, score] of Object.entries(scores)) {
                // Recupera o valor que estava digitado ou deixa vazio
                const oldVal = inputsValues[`input-${user}`] || '';
                
                board.innerHTML += `
                    <div class="player-row">
                        <span class="player-name">${user}: <span style="color:#007bff">${score}</span></span>
                        <div class="score-ctrl">
                            <input type="number" id="input-${user}" placeholder="0" value="${oldVal}">
                            <button class="btn-action btn-add" onclick="addScore('${user}')">Somar</button>
                            <button class="btn-action btn-set" onclick="setScore('${user}')" title="Mudar valor total">Definir</button>
                        </div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
